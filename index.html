<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hospital Call Panel Builder</title>
<link rel="stylesheet" href="css/app.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23f5f5f7'/><circle cx='50' cy='50' r='31' fill='%231d1d1f'/><circle cx='50' cy='40' r='7' fill='%23f5f5f7'/><path d='M50 49 L60 70 L40 70 Z' fill='%23f5f5f7'/></svg>">
</head>
<body>
<div id="emergencyVignette"></div>

<header id="topbar">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 100 100" width="22" height="22" aria-hidden="true">
        <rect x="4" y="4" width="92" height="92" rx="26" fill="#1d1d1f"/>
        <circle cx="50" cy="50" r="28" fill="#f5f5f7"/>
        <circle cx="50" cy="41" r="6.5" fill="#1d1d1f"/>
        <path d="M50 49 L59 68 L41 68 Z" fill="#1d1d1f"/>
      </svg>
    </div>
    <div class="brand-text">
      <h1>Call Panel Builder</h1>
    </div>
  </div>

  <nav id="mainTabs">
    <button class="tab active" data-view="simulate">Simulate</button>
    <button class="tab" data-view="builder">Designer</button>
    <button class="tab" data-view="sounds">Sound Studio</button>
    <button class="tab" data-view="hospital">Hospital</button>
  </nav>

  <div class="topbar-right">
    <span id="statusSaved" class="saved-whisper">Saved</span>
    <button id="muteBtn" class="icon-btn" title="Mute / unmute alarms">
      <svg id="volIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>
    <button id="fsBtn" class="cta-pill" title="Fullscreen wall (F)">Fullscreen</button>
  </div>
</header>

<main id="view"></main>

<input type="file" id="importFile" accept=".json,application/json" style="display:none">

<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/svg.js"></script>
<script src="js/simulate.js"></script>
<script src="js/builder.js"></script>
<script src="js/sounds.js"></script>
<script src="js/hospital.js"></script>
<script src="js/app.js"></script>
</body>
</html>
